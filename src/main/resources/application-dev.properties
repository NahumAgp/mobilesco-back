# =========================
# DATABASE
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/erp_mobilesco?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================
# SWAGGER
# =========================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# =========================
# JWT
# =========================
security.jwt.issuer=mobilesco
security.jwt.access-ttl-minutes=15
security.jwt.refresh-ttl-days=30
#security.jwt.secret-base64=${JWT_SECRET_BASE64:dev_secret_local}
security.jwt.secret-base64=${JWT_SECRET_BASE64:uJ+Gm85KR5D9TXbzOo85js/uo0/8GK0zvlPNYsdL/gAb5fkch2uQS32R/aoYsTXNOgk/XLoweQGRX07u7yAttA==}

# =========================
# UPLOADS
# =========================
app.uploads.dir=${UPLOAD_DIR:./uploads}

# MULTIPART
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

server.address=0.0.0.0